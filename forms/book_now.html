<!DOCTYPE html>
<html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta http-equiv="X-UA-Compatible" content="IE=edge">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Giluwe Contact Form</title>
            <link rel="stylesheet" href="../Giluwe_CSS/book.css">
            
            <!--These links (Font awesome and google are used for icon)-->
            <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
            <link rel="stylesheet" href="https://unpkg.com/swiper.com/swiper-bundle.min.css" />
     <style>

.button-area a
{
    font-size: 18px;
    border: none;
    color: #fff;
    cursor: pointer;
    border-radius: 5px;
    background: rgb(255, 145, 0);
    padding: 13px 25px;
    text-decoration: none;
     
}
.wrapper
{
    width: 720px;
    background: #1f2833;
    border-radius: 5px;
    min-height: 75vh;
     padding:  0 40px;
     margin-bottom: 150px;
     align-items: center;
     margin-left: 240px;
}
     </style>       
</head>
<body>
    <div class="button-area">
        <a href="../index.html" src="" >BACK</a>
    </div>
    <br><br>
    <div class="wrapper"> 
        <header>Book now for an Adventure</header>
        <form action="#">
            <div class="field-box">
                <div class="field">
                    <h3>Name</h3>
                    <input type="text" name="name" placeholder="Enter your name">
                    <i class="fas fa-user"></i>
                </div>
                <div class="field">
                    <h3>Where to</h3>
                    <input type="text" name="number" placeholder="Name of Place">
                    <i class="fas fa-person"></i>
            </div>
            <br>
            <div class="field">
                <h3>How many</h3>
                <input type="number" name="number" placeholder="Number of Guest">
                <i class="fas fa-person"></i>
        </div>
        </div>
        <div class="field-box">
        <div class="field">
            <h3>Email Address</h3>
            <input type="email" name="email" placeholder="Enter your email">
            <i class="fas fa-envelope"></i>
        </div>
        <br><br>
            
                <div class="field">
                    <h3>Arrival Date</h3>
                    <input type="date" name="Arival" >
                    <i class="fas fa-time"></i>
                </div>
                <div class="field">
                    <h3>Leaving Date</h3>
                    <input type="date" name="Leaving">
                    <i class="fas fa-time"></i>
            </div>
            </div>
            <div class="button-area">
                <button type="submit">Book now</button>
                <span>Sending your message...</span>
            </div>
            </form>  
    </div>              
</body>
</html>
