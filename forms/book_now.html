<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now - Mt Giluwe</title>
    <link rel="stylesheet" href="../giluwe_css/book.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        .button-area a {
            font-size: 18px;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            background: rgb(255, 145, 0);
            padding: 13px 25px;
            text-decoration: none;
        }
        .wrapper {
            width: 720px;
            background: #1f2833;
            border-radius: 5px;
            min-height: 75vh;
            padding: 0 40px;
            margin-bottom: 150px;
            align-items: center;
            margin-left: 240px;
        }
        .status-msg {
            display: none;
            margin-top: 10px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="button-area">
        <a href="../index.html">BACK</a>
    </div>
    <br><br>
    <div class="wrapper">
        <header>Book now for an Adventure</header>
        <form id="bookingForm">
            <div class="field-box">
                <div class="field">
                    <h3>Name</h3>
                    <input type="text" name="name" placeholder="Enter your name" required>
                    <i class="fas fa-user"></i>
                </div>
                <div class="field">
                    <h3>Where to</h3>
                    <input type="text" name="where_to" placeholder="Name of Place">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <br>
                <div class="field">
                    <h3>How many</h3>
                    <input type="number" name="guests" placeholder="Number of Guests" min="1">
                    <i class="fas fa-users"></i>
                </div>
            </div>
            <div class="field-box">
                <div class="field">
                    <h3>Email Address</h3>
                    <input type="email" name="email" placeholder="Enter your email" required>
                    <i class="fas fa-envelope"></i>
                </div>
                <br><br>
                <div class="field">
                    <h3>Arrival Date</h3>
                    <input type="date" name="arrival" required>
                    <i class="fas fa-calendar-alt"></i>
                </div>
                <div class="field">
                    <h3>Leaving Date</h3>
                    <input type="date" name="leaving" required>
                    <i class="fas fa-calendar-alt"></i>
                </div>
            </div>
            <div class="button-area">
                <button type="submit">Book now</button>
                <span class="status-msg">Sending your booking...</span>
            </div>
        </form>
    </div>

    <script>
        const bookingForm = document.getElementById('bookingForm');
        const statusMsg = bookingForm.querySelector('.status-msg');

        bookingForm.onsubmit = (e) => {
            e.preventDefault();
            statusMsg.style.color = '#0D6EFD';
            statusMsg.style.display = 'block';
            statusMsg.innerText = 'Sending your booking...';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', 'book_now.php', true);
            xhr.onload = () => {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    if (xhr.response === 'success') {
                        statusMsg.style.color = 'green';
                        statusMsg.innerText = 'Booking submitted successfully!';
                        bookingForm.reset();
                    } else {
                        statusMsg.style.color = 'red';
                        statusMsg.innerText = xhr.response;
                    }
                }
            };
            xhr.send(new FormData(bookingForm));
        };
    </script>
</body>
</html>
